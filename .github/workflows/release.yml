name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的版本号 (如 0.1.2),会同步更新 NuGet.Package.Template.props'
        required: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  publish:
    name: 发布到 nuget.org 与 GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 还原依赖
        run: dotnet restore

      - name: 构建并测试
        # TreatWarningsAsErrors 由 Directory.Build.props 强制执行，
        # 此处 --warnaserror 显式声明便于阅读。
        run: |
          dotnet build --no-restore --configuration Release --warnaserror
          dotnet test --no-build --configuration Release

      - name: 打包
        run: dotnet pack src/TreeMemoryCache/TreeMemoryCache.csproj --no-build --configuration Release --output ./artifacts

      - name: 推送到 nuget.org
        run: dotnet nuget push "./artifacts/*.nupkg" --source nuget.org --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate

      - name: 推送到 GitHub Packages
        run: dotnet nuget push "./artifacts/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate

      - name: 创建 GitHub Release（tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: 创建 GitHub Release（手动触发）
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          tag_name: ${{ github.event.inputs.tag }}
