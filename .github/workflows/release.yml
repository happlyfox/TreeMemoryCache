name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的版本号 (如 0.1.2)'
        required: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 更新版本号
        run: |
          # tag 触发时从 GITHUB_REF 提取版本号，手动触发时使用输入的版本号
          if [[ "${{ github.event.inputs.tag }}" != "" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "版本号: ${VERSION}"
          sed -i "s|<Version>[^<]*</Version>|<Version>${VERSION}</Version>|g" src/TreeMemoryCache/NuGet.Package.Template.props

      - name: 还原依赖
        run: dotnet restore

      - name: 构建并测试
        run: |
          dotnet build --no-restore --configuration Release --warnaserror
          dotnet test --no-build --configuration Release

      - name: 打包
        run: dotnet pack src/TreeMemoryCache/TreeMemoryCache.csproj --no-build --configuration Release --output ./artifacts

      - name: 推送到 nuget.org
        run: dotnet nuget push "./artifacts/*.nupkg" --source nuget.org --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate

      - name: 推送到 GitHub Packages
        run: dotnet nuget push "./artifacts/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
